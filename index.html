<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Now</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="index.html">⛅ Weather Now</a>
  <nav>
    <a href="index.html" class="active">Weather</a>
    <a href="about.html">About</a>
  </nav>
</header>
<main class="wrap">
  <form class="searchbar" id="form">
    <input id="q" placeholder="Search a city…" autocomplete="off">
    <button type="submit">Search</button>
  </form>
  <div id="status" class="status">Loading your last city…</div>

  <section class="current card" id="current" hidden>
    <div class="c-top">
      <div>
        <h1 id="place"></h1>
        <p id="desc" class="desc"></p>
      </div>
      <div class="icon" id="icon"></div>
    </div>
    <div class="temp"><span id="temp"></span><small>°C</small></div>
    <div class="metrics">
      <div><small>Feels-like range</small><b id="range"></b></div>
      <div><small>Humidity</small><b id="hum"></b></div>
      <div><small>Wind</small><b id="wind"></b></div>
    </div>
  </section>

  <h2 class="fc-title" id="fcTitle" hidden>7-day forecast</h2>
  <div class="forecast" id="forecast"></div>
</main>
<footer class="foot">Weather Now · data © Open-Meteo · SKRIZIdev</footer>
<script src="js/weather.js"></script>
</body>
</html>
